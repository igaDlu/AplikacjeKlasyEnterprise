<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html">
<h:head>
    <title>News</title>
</h:head>
<h:body>
    <h:form>
    <h:outputText for="headingInputText" value="heading"></h:outputText>
    <h:inputText id="headingInputText" value="#{newsBean.headingText}"></h:inputText>

    <h:outputText for="bodyInputText" value="body"></h:outputText>
    <h:inputText id="bodyInputText" value="#{newsBean.bodyText}"></h:inputText>

    <h:commandButton id="submitButton" action="#{newsBean.submitNews}" value="Sumbit"></h:commandButton>

        <h:dataTable value="#{newsBean.newsItems}" var="item"
        border="1">
        <h:column>
            <f:facet name="header">
                <h:outputText value="Id"/>
            </f:facet>
            <h:outputText value="#{item.id}"/>
        </h:column>
        <h:column>
            <f:facet name="header">
                <h:outputText value="Heading"/>
            </f:facet>
            <h:outputText value="#{item.heading}"/>
        </h:column>
        <h:column>
            <f:facet name="header">
                <h:outputText value="Body"/>
            </f:facet>
            <h:outputText value="#{item.body}"/>
        </h:column>
    </h:dataTable>
    </h:form>

</h:body>
</html>
